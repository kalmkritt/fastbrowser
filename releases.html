<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>releases | fastbrowser</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;background:#111;color:#333;font-family:'SF Pro Text','SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,sans-serif}main{max-width:520px;margin:0 auto;padding:80px 24px;display:flex;flex-direction:column;gap:32px}h1{font-size:24px;font-weight:300;color:#fff;letter-spacing:-0.02em}.block{display:flex;flex-direction:column;gap:8px}.label{font-size:11px;color:#333}.text{font-size:12px;font-weight:300;color:#444;line-height:1.7}a{font-size:12px;color:#444;text-decoration:none;border-bottom:1px solid #222}a:hover{color:#888}#version{font-size:28px;font-weight:300;color:#fff}#date{font-size:11px;color:#333}#notes{font-size:12px;font-weight:300;color:#444;line-height:1.8;white-space:pre-wrap;word-wrap:break-word}.loading{color:#333;font-size:12px}.error{color:#555;font-size:12px}</style></head><body><main><h1>releases</h1><div class="block"><div id="version" class="loading">loading...</div><div id="date" class="loading">—</div></div><div class="block"><div class="label">changelog</div><div id="notes" class="loading">fetching latest release...</div></div><a href="index.html">back</a></main>
<script>fetch('https://api.github.com/repos/kalmkritt/FastBrowser-Setup/releases/latest').then(r=>r.json()).then(d=>{const v=document.getElementById('version'),t=document.getElementById('date'),n=document.getElementById('notes');v.textContent='v'+d.tag_name;t.textContent=new Date(d.published_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});n.textContent=d.body||'no changes listed';v.classList.remove('loading');t.classList.remove('loading');n.classList.remove('loading')}).catch(e=>{document.getElementById('notes').textContent='could not fetch latest release. check github directly.';document.getElementById('notes').classList.add('error')})</script>
</body></html>
